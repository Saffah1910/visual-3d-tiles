<!DOCTYPE html>
<html>

<head>
    <title>{{ product.name }}</title>

    <style>

        body{
            font-family: Poppins, Arial;
            margin:0;
            background:#f5f5f5;
        }

        .product-page{
            max-width:1100px;
            margin:auto;
            padding:40px;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:50px;
            background:white;
        }

        .product-image img{
            width:100%;
            border-radius:10px;
        }

        .product-info h1{
            font-size:32px;
            margin-bottom:10px;
        }

        .price{
            font-size:26px;
            color:green;
            margin:20px 0;
        }

        .info{
            margin:10px 0;
            font-size:18px;
        }

        .add-cart{
            background:black;
            color:white;
            padding:15px 30px;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        .add-cart:hover{
            background:#333;
        }

        .back{
            margin:20px;
            display:inline-block;
        }

    </style>

</head>

<body>

<a href="/" class="back">← Back to products</a>

<div class="product-page">

  

    <div class="product-info">

        <h1>{{ product.name|upper }}</h1>

        <div class="price">
            R {{ product.price }}
        </div>

        <div class="info">
            <strong>Material:</strong> {{ product.material }}
        </div>

        <div class="info">
            <strong>Dimensions:</strong> {{ product.dimensions }}
        </div>

        <div class="info">
            <strong>Colours:</strong> {{ product.colors }}
        </div>

        <br>

        <a href="{% url 'add_to_cart' product.id %}">
            <button class="add-cart">Add to Cart</button>
        </a>

    </div>

</div>

</body>
</html>
